<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>J5290 Orsay TV Player</title>

    <!-- Samsung Smart TV Legacy Scripts (Pure Orsay) -->
    <script type="text/javascript" src="$MANAGER_WIDGET/Common/API/Widget.js"></script>
    <script type="text/javascript" src="$MANAGER_WIDGET/Common/API/TVKeyValue.js"></script>
    <script type="text/javascript" src="$MANAGER_WIDGET/Common/API/Plugin.js"></script>
    <script type="text/javascript" src="$MANAGER_WIDGET/Common/webapi/1.0/webapis.js"></script>

    <!-- Player and App Logic -->
    <link rel="stylesheet" href="css/Main.css" type="text/css">
    <script type="text/javascript" src="js/Logger.js"></script>
    <script type="text/javascript" src="js/Player.js"></script>
    <script type="text/javascript" src="js/Main.js"></script>
</head>

<body onload="Main.onLoad();" onunload="Main.onUnload();">

    <!-- J5290 Orsay Player Plugins (SEF API) -->
    <object id="pluginPlayer" border="0" classid="clsid:SAMSUNG-INFOLINK-PLAYER"></object>
    <object id="pluginAudio" border="0" classid="clsid:SAMSUNG-INFOLINK-AUDIO"></object>
    <object id="pluginTVMW" border="0" classid="clsid:SAMSUNG-INFOLINK-TVMW"></object>
    <object id="pluginSef" border="0" classid="clsid:SAMSUNG-INFOLINK-SEF"></object>
    <object id="pluginObject" border="0" classid="clsid:SAMSUNG-INFOLINK-APPCOMMON"></object>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <div id="channel-info">
            <span id="channel-name">Carregando canais...</span>
        </div>
    </div>

    <!-- Log container for real-time debugging -->
    <div id="log-container"></div>

</body>
</html>
